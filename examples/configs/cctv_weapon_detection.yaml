project_name: cctv-weapon-detection
task: detection
backend: rfdetr

datasets:
  synthetic_train:
    path: ./data/cctv-weapon-dataset
    format: yolo

  synthetic_val:
    path: ./data/cctv-weapon-dataset
    format: yolo

  real_world_test:
    path: ./data/cctv-weapon-dataset
    format: yolo

model:
  architecture: rfdetr
  variant: base
  pretrained: true
  output_dir: ./runs/cctv-weapon-detection
  checkpoint: null
  epochs: 1
  batch_size: 2
  learning_rate: 0.0001
  confidence_threshold: 0.25

evaluation:
  metrics:
    - map50
    - precision
    - recall

seed: 42
