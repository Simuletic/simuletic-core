project_name: cctv-weapon-detection
task: detection
backend: rfdetr

datasets:
  synthetic_train:
    path: ./data/synthetic/train
    format: yolo

  synthetic_val:
    path: ./data/synthetic/val
    format: yolo

  real_world_test:
    path: ./data/real_world/test
    format: yolo

  hard_negatives:
    path: ./data/hard_negatives
    format: yolo

model:
  architecture: rfdetr
  variant: base
  pretrained: true
  output_dir: ./runs/cctv-weapon-detection
  epochs: 1
  batch_size: 2
  learning_rate: 0.0001

evaluation:
  metrics:
    - precision
    - recall
    - map50
    - false_positive_rate
    - synthetic_to_real_gap

seed: 42
